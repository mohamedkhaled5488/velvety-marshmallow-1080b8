# ── Application ───────────────────────────────────
base.url=https://velvety-marshmallow-1080b8.netlify.app
app.title=NetSymptom — Smart Network Diagnostic Engine | Why Is My Internet Slow?

# ── Browser ───────────────────────────────────────
browser=chrome
headless=false
window.width=1440
window.height=900

# ── Timeouts (seconds) ────────────────────────────
implicit.wait=5
explicit.wait=15
# Diagnostic engine runs for 10 seconds — allow extra buffer
diagnostic.wait=25
page.load.timeout=30

# ── Reporting ─────────────────────────────────────
screenshot.on.failure=true
screenshot.dir=test-output/screenshots
report.dir=test-output
